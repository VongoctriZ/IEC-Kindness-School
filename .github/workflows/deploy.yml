name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master        # push lên master → deploy production
  pull_request:
    branches:
      - master        # mở PR vào master → deploy preview để review

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Firebase client config — không phải secret (được nhúng vào JS bundle,
          # ai vào website cũng thấy). Security đến từ Firestore/Storage Rules.
          VITE_FIREBASE_API_KEY:             AIzaSyBlJUoX7YWoYrW-jsH0GPR414ftvz7IMJA
          VITE_FIREBASE_AUTH_DOMAIN:         kindness-school.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          kindness-school
          VITE_FIREBASE_STORAGE_BUCKET:      kindness-school.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "725249279365"
          VITE_FIREBASE_APP_ID:              1:725249279365:web:1758c70590ae432d60f0ec

      # Push lên master → deploy thẳng vào production (live)
      - name: Deploy to production
        if: github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:             ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: kindness-school

      # Mở PR → deploy vào preview channel (URL tạm thời để review)
      - name: Deploy preview (PR only)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:             ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: kindness-school
          # channelId không set → tự tạo preview URL theo PR number
